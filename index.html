<div id="yw-wrap">
  <div id="yw-card">
    <div id="yw-top">
      <div>
        <div id="yw-temp">--°</div>
        <div id="yw-loc">A localizar...</div>
      </div>
      <div id="yw-right">
        <div id="yw-icon">🌡️</div>
        <div id="yw-desc">--</div>
      </div>
    </div>
    <div id="yw-details">
      <div class="yw-box"><div class="yw-lbl">Vento</div><div class="yw-val" id="yw-wind">--</div><div class="yw-unit">km/h</div></div>
      <div class="yw-box"><div class="yw-lbl">Humidade</div><div class="yw-val" id="yw-hum">--</div><div class="yw-unit">%</div></div>
      <div class="yw-box"><div class="yw-lbl">Máx / Mín</div><div class="yw-val" id="yw-minmax" style="font-size:15px;">--</div></div>
    </div>
  </div>
  <div id="yw-forecast"></div>
</div>

<style>
#yw-wrap {
  font-family: sans-serif;
  max-width: 420px;
  margin: 0 auto;
}
#yw-card {
  background: linear-gradient(160deg, #4a5c3f 0%, #2d3e27 100%);
  border-radius: 18px;
  padding: 24px;
  color: #fff;
  margin-bottom: 12px;
}
#yw-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
}
#yw-temp {
  font-size: 58px;
  font-weight: 300;
  line-height: 1;
}
#yw-loc {
  font-size: 12px;
  opacity: 0.5;
  margin-top: 6px;
}
#yw-right { text-align: right; }
#yw-icon { font-size: 42px; line-height: 1; }
#yw-desc {
  font-size: 13px;
  opacity: 0.8;
  margin-top: 4px;
  text-transform: capitalize;
}
#yw-details {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.yw-box {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}
.yw-lbl {
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 4px;
}
.yw-val {
  font-size: 20px;
  font-weight: 300;
}
.yw-unit {
  font-size: 9px;
  opacity: 0.4;
  margin-top: 2px;
}
#yw-forecast {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
}
#yw-forecast::-webkit-scrollbar { display: none; }
.yw-fday {
  flex: none;
  background: #fff;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  min-width: 62px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.yw-fd-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  color: #666;
  margin-bottom: 6px;
}
.yw-fd-icon { font-size: 22px; margin-bottom: 4px; }
.yw-fd-max { font-size: 16px; color: #333; font-weight: 500; }
.yw-fd-min { font-size: 11px; color: #aaa; }
</style>

<script>
(function(){
  const ICONS = {
    0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
    45:'🌫️',48:'🌫️',
    51:'🌦️',53:'🌦️',55:'🌧️',
    61:'🌧️',63:'🌧️',65:'🌧️',
    71:'❄️',73:'❄️',75:'❄️',
    80:'🌦️',81:'🌧️',82:'⛈️',
    95:'⛈️',96:'⛈️',99:'⛈️'
  };
  const DESC = {
    0:'Céu limpo',1:'Maioritariamente limpo',2:'Parcialmente nublado',3:'Nublado',
    45:'Nevoeiro',48:'Nevoeiro glaciar',
    51:'Chuvisco leve',53:'Chuvisco',55:'Chuvisco intenso',
    61:'Chuva leve',63:'Chuva',65:'Chuva intensa',
    71:'Neve leve',73:'Neve',75:'Neve intensa',
    80:'Aguaceiros',81:'Aguaceiros',82:'Aguaceiros intensos',
    95:'Trovoada',96:'Trovoada c/ saraiva',99:'Trovoada intensa'
  };
  const DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  (async () => {
    const lat = 41.7258, lon = -8.1583;
    const city = 'Gerês';

    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,relative_humidity_2m&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`);
    const d = await r.json();
    const c = d.current;

    document.getElementById('yw-temp').textContent = Math.round(c.temperature_2m) + '°';
    document.getElementById('yw-loc').textContent = city;
    document.getElementById('yw-icon').textContent = ICONS[c.weathercode] || '🌡️';
    document.getElementById('yw-desc').textContent = DESC[c.weathercode] || '';
    document.getElementById('yw-wind').textContent = Math.round(c.windspeed_10m);
    document.getElementById('yw-hum').textContent = c.relative_humidity_2m;
    document.getElementById('yw-minmax').textContent =
      Math.round(d.daily.temperature_2m_max[0]) + '° / ' + Math.round(d.daily.temperature_2m_min[0]) + '°';

    let html = '';
    for(let i = 0; i < 7; i++){
      const date = new Date(d.daily.time[i]);
      const label = i === 0 ? 'Hoje' : DAYS[date.getDay()];
      html += `<div class="yw-fday">
        <div class="yw-fd-label">${label}</div>
        <div class="yw-fd-icon">${ICONS[d.daily.weathercode[i]] || '🌡️'}</div>
        <div class="yw-fd-max">${Math.round(d.daily.temperature_2m_max[i])}°</div>
        <div class="yw-fd-min">${Math.round(d.daily.temperature_2m_min[i])}°</div>
      </div>`;
    }
    document.getElementById('yw-forecast').innerHTML = html;

  })();
})();
</script>
